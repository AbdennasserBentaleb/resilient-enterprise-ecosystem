version: '3.8'

services:
  # Core Database for Ledger with Row-Level Security
  postgres:
    image: postgres:15-alpine
    container_name: ledger-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ledger_db
    command: ["postgres", "-c", "wal_level=logical"]
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts/01-init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql
    networks:
      - ledger-network

  # Distributed Locks and Caching
  redis:
    image: redis:7-alpine
    container_name: ledger-redis
    ports:
      - "6379:6379"
    networks:
      - ledger-network

  # Identity Provider for Zero-Trust Security Gateway
  keycloak:
    image: quay.io/keycloak/keycloak:22.0.5
    container_name: ledger-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-postgres}
    command: start-dev --import-realm
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak-realm:/opt/keycloak/data/import
    depends_on:
      - postgres
    networks:
      - ledger-network

  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.1
    container_name: ledger-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ledger-network

  # Kafka Message Broker
  kafka:
    image: confluentinc/cp-kafka:7.4.1
    container_name: ledger-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - ledger-network

  # Debezium Connect for PostgreSQL CDC
  debezium:
    image: quay.io/debezium/connect:2.4.0.Final
    container_name: ledger-debezium
    depends_on:
      - kafka
      - postgres
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: my_connect_configs
      OFFSET_STORAGE_TOPIC: my_connect_offsets
      STATUS_STORAGE_TOPIC: my_connect_statuses
    networks:
      - ledger-network

  # RabbitMQ Broker for Application Event Dispatching
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: ledger-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - ledger-network

volumes:
  postgres-data:

networks:
  ledger-network:
    driver: bridge
