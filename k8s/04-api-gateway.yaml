apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: portfolio-ecosystem
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: urregistry.io/portfolio/api-gateway:latest
          imagePullPolicy: Never
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          envFrom:
            - configMapRef:
                name: ledger-config
          env:
            - name: LEDGER_URI
              value: "http://core-ledger-svc:8082"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-svc
  namespace: portfolio-ecosystem
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
